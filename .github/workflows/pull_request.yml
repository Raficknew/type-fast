name: CODE CHECK

on: [pull_request]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      
      - name: Run Biome
        run: biome ci .

      - name: notify vercel
        if: ${{ always() }}
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - type-fast: lint"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run Tests
        run: pnpm test

  doctor:
    needs: lint
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Run React Doctor
        uses: millionco/react-doctor@main
        with:
          diff: main
          github-token: ${{ secrets.GITHUB_TOKEN }}